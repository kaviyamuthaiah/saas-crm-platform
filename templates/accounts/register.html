{% extends "auth_base.html" %}
{% load crispy_forms_tags %}

{% block title %}Create Workspace{% endblock %}

{% block auth_content %}
<div class="mb-4">
  <h2 class="auth-form-title">Create your workspace</h2>
  <p class="auth-form-subtitle">Get started — free forever on the Free plan</p>
</div>

<form method="post" novalidate>
  {% csrf_token %}
  {{ form|crispy }}
  <button type="submit" class="btn btn-primary w-100 btn-lg mt-2">
    <i class="bi bi-rocket-takeoff me-2"></i>Create Workspace
  </button>
</form>

<p class="text-center mt-4 text-muted">
  Already have a workspace?
  <a href="{% url 'accounts:login' %}" class="text-primary fw-semibold">Sign in</a>
</p>
{% endblock %}
