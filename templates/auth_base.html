<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}{% endblock %} | SaaS Platform</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="/static/css/main.css" rel="stylesheet"/>
</head>
<body class="auth-body">
<div class="auth-wrapper">
  <!-- Left panel: branding -->
  <div class="auth-brand-panel d-none d-lg-flex">
    <div class="auth-brand-content">
      <div class="auth-logo mb-4">
        <i class="bi bi-layers-fill"></i>
      </div>
      <h1 class="auth-headline">One platform.<br/>Every team.</h1>
      <p class="auth-sub">Projects, tasks, and CRM — all in a single multi-tenant workspace built for modern teams.</p>
      <div class="auth-features mt-5">
        <div class="auth-feature-item"><i class="bi bi-check-circle-fill me-2"></i>Multi-tenant isolation</div>
        <div class="auth-feature-item"><i class="bi bi-check-circle-fill me-2"></i>Role-based access control</div>
        <div class="auth-feature-item"><i class="bi bi-check-circle-fill me-2"></i>Full CRM pipeline</div>
        <div class="auth-feature-item"><i class="bi bi-check-circle-fill me-2"></i>Project & task management</div>
      </div>
    </div>
  </div>
  <!-- Right panel: form -->
  <div class="auth-form-panel">
    <div class="auth-form-inner">
      {% block auth_content %}{% endblock %}
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
