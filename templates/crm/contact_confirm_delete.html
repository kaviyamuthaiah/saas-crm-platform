{% extends "base.html" %}
{% block title %}Delete Contact{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card shadow-sm border-danger">
      <div class="card-header bg-danger text-white"><h5 class="mb-0">Delete Contact</h5></div>
      <div class="card-body">
        <p>Delete contact: <strong>{{ object.full_name }}</strong>?</p>
        <form method="post">
          {% csrf_token %}
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-danger">Delete</button>
            <a href="{% url 'crm:contact_list' %}" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
