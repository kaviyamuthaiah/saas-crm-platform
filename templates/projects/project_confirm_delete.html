{% extends "base.html" %}

{% block title %}Delete Project{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card shadow-sm border-danger">
      <div class="card-header bg-danger text-white"><h5 class="mb-0">Delete Project</h5></div>
      <div class="card-body">
        <p>Are you sure you want to delete <strong>{{ object.name }}</strong>?</p>
        <p class="text-danger small">This will also delete all associated tasks. This action cannot be undone.</p>
        <form method="post">
          {% csrf_token %}
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-danger">Yes, Delete</button>
            <a href="{% url 'projects:project_list' %}" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
